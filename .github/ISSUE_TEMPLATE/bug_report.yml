name: 🐛 Reporte de Bug
description: Reporta un error o comportamiento inesperado en MiBolsillo
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por tomarte el tiempo de reportar este bug. Por favor completa la información a continuación.

  - type: textarea
    id: description
    attributes:
      label: Descripción del bug
      description: Una descripción clara y concisa de qué está fallando.
      placeholder: "Cuando hago X, ocurre Y en lugar de Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Pasos para reproducirlo
      description: Pasos detallados para reproducir el comportamiento.
      placeholder: |
        1. Abrir la app
        2. Ir a '...'
        3. Hacer tap en '...'
        4. Ver el error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamiento esperado
      description: ¿Qué debería ocurrir?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Capturas de pantalla
      description: Si aplica, agrega capturas para ayudar a entender el problema.

  - type: dropdown
    id: platform
    attributes:
      label: Plataforma
      options:
        - Android
        - iOS
        - Ambas
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: Versión de Flutter
      placeholder: "flutter --version"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Información adicional
      description: Cualquier otro contexto relevante sobre el problema.
